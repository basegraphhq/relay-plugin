name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json
        run: python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"

      - name: Validate marketplace.json
        run: python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"

      - name: Validate hooks.json
        run: python3 -c "import json; json.load(open('hooks/hooks.json'))"

      - name: Python syntax check
        run: |
          python3 -m py_compile hooks/session_start.py
          python3 -m py_compile hooks/stop.py

      - name: Smoke test SessionStart hook
        env:
          CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}
        run: |
          out=$(python3 hooks/session_start.py)
          python3 -c "import json, sys; d = json.loads('''$out'''); assert d['hookSpecificOutput']['hookEventName'] == 'SessionStart'; assert len(d['hookSpecificOutput']['additionalContext']) > 1000"

      - name: Smoke test Stop hook
        run: |
          echo '{"session_id":"x","transcript_path":"/nonexistent","cwd":"/tmp","stop_hook_active":false}' | python3 hooks/stop.py
